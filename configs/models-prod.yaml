# Tunnel Engine – Production Model Registry (RTX Pro 6000, 96 GB)
# Select via REGISTRY=configs/models-prod.yaml or TUNNEL_REGISTRY.
# All vLLM weights stream from Wasabi S3 (runai_streamer); see docs/s3-llm.md.
# Model details: docs/models/.

defaults:
  tensor_parallel_size: 1
  dtype: "auto"
  max_model_len: 16384
  enable_thinking: false
  scheduling_policy: priority
  lora:
    enabled: false
    modules: []
  lmcache:
    enabled: true
    backend: cpu
    max_cache_size_gb: 20
    chunk_size: 256
  cost:
    input_per_mtok: 0.05
    output_per_mtok: 0.20
  extra_args: []

gpu:
  budget: 0.90

instances:
  - id: qwen3.5-0.8b
    model: s3://llm-qwen3.5-bucket/Qwen3.5-0.8B
    served_model_name: Qwen3.5-0.8B
    load_format: runai_streamer
    port: 8000
    gpu_memory_utilization: 0.10
    attention_backend: FLASHINFER
    chat_template: configs/templates/qwen3.5-enhanced.jinja
    tool_parser: qwen3_xml
    reasoning_parser: qwen3
    lmcache:
      mamba_align: true
      chunk_size: 544
    # Mamba hybrid: one cache block per decode seq; vLLM's default
    # max_num_seqs 1024 cannot fit and aborts CUDA graph capture.
    extra_args: ["--max-num-seqs", "64"]
    description: "Qwen3.5 0.8B – Tool-calling bench model"

  - id: qwen3.5-2b
    model: s3://llm-qwen3.5-bucket/Qwen3.5-2B
    served_model_name: Qwen3.5-2B
    load_format: runai_streamer
    port: 8001
    gpu_memory_utilization: 0.12
    attention_backend: FLASHINFER
    chat_template: configs/templates/qwen3.5-enhanced.jinja
    tool_parser: qwen3_xml
    reasoning_parser: qwen3
    lmcache:
      mamba_align: true
      chunk_size: 544  # verified: vLLM startup log 2026-07-18
    extra_args: ["--max-num-seqs", "64"]
    description: "Qwen3.5 2B – Tool-calling bench model"

  - id: qwen3.5-4b
    model: s3://llm-qwen3.5-bucket/Qwen3.5-4B
    served_model_name: Qwen3.5-4B
    load_format: runai_streamer
    port: 8002
    gpu_memory_utilization: 0.16
    attention_backend: FLASHINFER
    chat_template: configs/templates/qwen3.5-enhanced.jinja
    tool_parser: qwen3_xml
    reasoning_parser: qwen3
    lmcache:
      mamba_align: true
      chunk_size: 528  # verified: vLLM startup log 2026-07-18 (differs from 0.8B/2B)
    extra_args: ["--max-num-seqs", "64"]
    description: "Qwen3.5 4B – Tool-calling bench model"

  - id: gemma-4-e2b
    model: s3://llm-gemma4-bucket/gemma-4-E2B-it
    served_model_name: gemma-4-E2B-it
    load_format: runai_streamer
    port: 8003
    gpu_memory_utilization: 0.18
    tool_parser: gemma4
    reasoning_parser: gemma4
    description: "Gemma 4 E2B – Tool-calling bench model"

  - id: minicpm5-1b
    model: s3://llm-minicpm5-bucket/MiniCPM5-1B
    served_model_name: MiniCPM5-1B
    load_format: runai_streamer
    port: 8004
    gpu_memory_utilization: 0.08
    tool_parser: minicpm5
    description: "MiniCPM5 1B – Tool-calling bench model"

# Bonsai GGUF bench servers: PrismML llama.cpp fork (vLLM lacks Q1_0/Q2_0
# kernels), started with `make bonsai-up`. Local but unmanaged: no orchestrator
# launch/health-gating, and their VRAM is outside the gpu budget check.
# Set BONSAI_API_KEY=none in .env; llama-server runs keyless and ignores it.
remote_models:
  - id: bonsai-27b-1bit
    upstream_model: bonsai-27b-1bit
    api_base: http://127.0.0.1:8005/v1
    api_key_env: BONSAI_API_KEY
    description: "Bonsai 27B 1-bit GGUF – Tool-calling bench model (llama.cpp)"

  - id: ternary-bonsai-27b
    upstream_model: ternary-bonsai-27b
    api_base: http://127.0.0.1:8006/v1
    api_key_env: BONSAI_API_KEY
    description: "Ternary Bonsai 27B Q2_0 GGUF – Tool-calling bench model (llama.cpp)"

litellm:
  port: 4000
  master_key: "os.environ/LITELLM_MASTER_KEY"
  routing_strategy: least-busy
  prometheus: false

# Internal-only deployment: single tier, no budget caps, limits set high
# enough to never gate the bench harness (schema requires rpm/tpm >= 1).
tiers:
  internal:
    priority: 0
    rpm_limit: 1000000
    tpm_limit: 1000000000

services:
  - id: tools-bench
    tier: internal
    description: "Tools Bench harness"
