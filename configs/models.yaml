# Tunnel Engine – Model Registry
# Single Source of Truth. Edit here, run `make generate` to rebuild all
# derived configs (LiteLLM proxy config + per-instance LMCache configs).
#
# To add a model: copy any instance block, change id/model/port/gpu_memory_utilization.
# To remove a model: delete the block, run `make generate`.

# Defaults – merged into every instance. Instance-level values always win.
defaults:
  tensor_parallel_size: 1
  dtype: "auto"
  max_model_len: 16384
  enable_thinking: false
  lora:
    enabled: false
    modules: []
  lmcache:
    enabled: true
    backend: cpu
    max_cache_size_gb: 20
    chunk_size: 256
  extra_args: []

# GPU memory budget – `make check` fails if instance gpu_memory_utilization sums past this.
gpu:
  budget: 0.90

# Instances
instances:
  - id: qwen-0.8b
    model: Qwen/Qwen3.5-0.8B
    port: 8000
    gpu_memory_utilization: 0.35
    attention_backend: FLASHINFER
    chat_template: configs/templates/qwen3.5-enhanced.jinja
    tool_parser: qwen3_xml
    reasoning_parser: qwen3
    lmcache:
      enabled: false  # Qwen3.5 is a hybrid-attention model; the LMCache KV connector
                      # forces vLLM's hybrid KV manager off and the engine fails to start.
                      # Hybrid models use vLLM's native prefix cache instead.
    description: "Qwen 0.8B – Tool-calling bench model (hybrid attn; LMCache off)"

  - id: minicpm-1b
    model: openbmb/MiniCPM5-1B
    port: 8001
    gpu_memory_utilization: 0.45
    tool_parser: minicpm5
    description: "MiniCPM 1B – Tool-calling bench model"

  # Add more instances below. Examples:
  #
  # Standard model:
  # - id: llama-3b
  #   model: meta-llama/Llama-3.2-3B-Instruct
  #   port: 8002
  #   gpu_memory_utilization: 0.30
  #   description: "LLaMA 3B – general purpose"
  #   fallbacks: [qwen-0.8b]  # if this instance OOMs or times out, route here
  #
  # LoRA adapter:
  # - id: custom-lora
  #   model: meta-llama/Llama-3.2-3B-Instruct
  #   port: 8003
  #   gpu_memory_utilization: 0.30
  #   lora:
  #     enabled: true
  #     modules:
  #       - name: my-task-adapter
  #         path: /path/to/lora/adapter
  #
  # Custom Jinja2 output template:
  # - id: service-a-model
  #   model: Qwen/Qwen3.5-0.8B
  #   port: 8004
  #   gpu_memory_utilization: 0.35
  #   chat_template: configs/templates/service_a.jinja2
  #
  # Multi-GPU:
  # - id: large-model
  #   model: Qwen/Qwen2.5-7B-Instruct
  #   port: 8005
  #   gpu_memory_utilization: 0.80
  #   tensor_parallel_size: 2
  #
  # Tool-calling bench model (quantized):
  # - id: qwen-4b-fp8
  #   model: Qwen/Qwen3.5-4B
  #   port: 8006
  #   gpu_memory_utilization: 0.20
  #   quantization: fp8
  #   tool_parser: hermes
  #   reasoning_parser: qwen3

# Remote OpenAI-compatible upstreams, routed through the same :4000 gateway.
# These run no local process (no port / GPU) and are never launched or health-gated.
# Set DEEPSEEK_API_KEY in .env. A local instance may fall back to one of these
# (e.g. fallbacks: [deepseek-v4-flash]) to escalate overflow / hard queries.
remote_models:
  - id: deepseek-v4-pro
    upstream_model: deepseek-v4-pro
    api_base: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    description: "DeepSeek V4 Pro – hosted, thinking-capable"

  - id: deepseek-v4-flash
    upstream_model: deepseek-v4-flash
    api_base: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    description: "DeepSeek V4 Flash – hosted, fast/cheap"

litellm:
  port: 4000
  master_key: "os.environ/LITELLM_MASTER_KEY"
  routing_strategy: least-busy
  prometheus: true  # set to true to expose /metrics grafana dashboard
