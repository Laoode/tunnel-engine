# =============================================================================
# Tunnel Engine — Model Registry
# =============================================================================
# SINGLE SOURCE OF TRUTH. Edit here, run `make generate` to rebuild all
# derived configs (LiteLLM proxy config + per-instance LMCache configs).
#
# To add a model: copy any instance block, change id/model/port/gpu_memory_utilization.
# To remove a model: delete the block, run `make generate`.
# =============================================================================

# ---------------------------------------------------------------------------
# Defaults — merged into every instance. Instance-level values always win.
# ---------------------------------------------------------------------------
defaults:
  tensor_parallel_size: 1
  dtype: "auto"
  max_model_len: 65536
  lora:
    enabled: false
    modules: []
  lmcache:
    enabled: true
    backend: cpu
    max_cache_size_gb: 20
    chunk_size: 256
  extra_args: []

# ---------------------------------------------------------------------------
# Instances
# ---------------------------------------------------------------------------
instances:
  - id: qwen-0.8b
    model: Qwen/Qwen3.5-0.8B
    port: 8000
    gpu_memory_utilization: 0.35
    description: "Qwen 0.8B — fast general inference"
    fallbacks: [minicpm-1b]  # if this instance OOMs or times out, route here

  - id: minicpm-1b
    model: openbmb/MiniCPM5-1B
    port: 8001
    gpu_memory_utilization: 0.45
    description: "MiniCPM 1B — general purpose"
    # no fallback — last in chain

  # ── Add more instances below ─────────────────────────────────────────────
  #
  # Standard model:
  # - id: llama-3b
  #   model: meta-llama/Llama-3.2-3B-Instruct
  #   port: 8002
  #   gpu_memory_utilization: 0.30
  #
  # LoRA adapter:
  # - id: custom-lora
  #   model: meta-llama/Llama-3.2-3B-Instruct
  #   port: 8003
  #   gpu_memory_utilization: 0.30
  #   lora:
  #     enabled: true
  #     modules:
  #       - name: my-task-adapter
  #         path: /path/to/lora/adapter
  #
  # Custom Jinja2 output template:
  # - id: service-a-model
  #   model: Qwen/Qwen3.5-0.8B
  #   port: 8004
  #   gpu_memory_utilization: 0.35
  #   chat_template: configs/templates/service_a.jinja2
  #
  # Multi-GPU:
  # - id: large-model
  #   model: Qwen/Qwen2.5-7B-Instruct
  #   port: 8005
  #   gpu_memory_utilization: 0.80
  #   tensor_parallel_size: 2

litellm:
  port: 4000
  master_key: "sk-tunnel-dev-change-in-prod"
  routing_strategy: least-busy

lmcache:
  backend: cpu
  max_cache_size_gb: 20
  chunk_size: 256
