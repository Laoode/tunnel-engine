# Tunnel Engine – Model Registry
# Single Source of Truth. Edit here, run `make generate` to rebuild all
# derived configs (LiteLLM proxy config + per-instance LMCache configs).
#
# To add a model: copy any instance block, change id/model/port/gpu_memory_utilization.
# To remove a model: delete the block, run `make generate`.

# Defaults – merged into every instance. Instance-level values always win.
defaults:
  tensor_parallel_size: 1
  dtype: "auto"
  max_model_len: 16384
  enable_thinking: false
  # Strict-priority scheduling: enterprise requests preempt lower tiers.
  # vLLM caveat: priority + n>1 crashes the engine (vllm#29747); no service
  # sends n>1. Override per instance with fcfs if a model misbehaves.
  scheduling_policy: priority
  lora:
    enabled: false
    modules: []
  # Each enabled instance runs its own `lmcache server` (MP mode) on
  # port = instance port + 1000 (override with lmcache.port). vLLM connects
  # via LMCacheMPConnector, which also supports hybrid-attention models
  # (Qwen3.5 Mamba+Full, Gemma 4 SWA+Full). See docs/lmcache.md.
  # max_cache_size_gb is CPU RAM (L1) per instance; host has ~21GB free.
  lmcache:
    enabled: true
    backend: cpu
    max_cache_size_gb: 8
    chunk_size: 256
  extra_args: []

# GPU memory budget – `make check` fails if instance gpu_memory_utilization sums past this.
gpu:
  budget: 0.90

# Instances
instances:
  - id: qwen-0.8b
    model: Qwen/Qwen3.5-0.8B
    port: 8000
    gpu_memory_utilization: 0.35
    attention_backend: FLASHINFER
    chat_template: configs/templates/qwen3.5-enhanced.jinja
    tool_parser: qwen3_xml
    reasoning_parser: qwen3
    lmcache:
      enabled: true
      # Mamba-hybrid (GDN + Full attention): LMCacheMPConnector handles the
      # hybrid KV groups; mamba_align emits --mamba-cache-mode align,
      # --enable-prefix-caching and --max-num-batched-tokens 2N-1.
      # chunk_size MUST equal the unified attention block size N that vLLM
      # prints at startup ("Setting attention block size to N tokens").
      mamba_align: true
      chunk_size: 544
    cost:             # synthetic amortized GPU rate (USD per 1M tokens) for spend tracking
      input_per_mtok: 0.05
      output_per_mtok: 0.20
    description: "Qwen 0.8B – Tool-calling bench model (hybrid attn via LMCache MP)"

  - id: minicpm-1b
    model: openbmb/MiniCPM5-1B
    port: 8001
    gpu_memory_utilization: 0.45
    tool_parser: minicpm5
    cost:             # synthetic amortized GPU rate (USD per 1M tokens) for spend tracking
      input_per_mtok: 0.05
      output_per_mtok: 0.20
    description: "MiniCPM 1B – Tool-calling bench model"

  - id: xguard-0.6b
    model: Alibaba-AAIG/YuFeng-XGuard-Reason-0.6B
    port: 8002
    gpu_memory_utilization: 0.10
    max_model_len: 4096
    internal: true          # guardrail classifier: never client-routable
    scheduling_policy: fcfs # single-priority traffic; also avoids vllm#29747 class
    lmcache:
      enabled: false        # 1-token classification turns; KV offload is pure overhead
    extra_args: ["--enforce-eager", "--max-num-seqs", "16"]  # skip CUDA graphs to fit 0.10
    description: "YuFeng XGuard 0.6B – gateway content-safety classifier (internal)"

  # S3-streamed model (Wasabi S3 via Run:ai streamer): weights stream straight
  # from the bucket into VRAM at startup — no local HF download, no disk copy.
  # Provider-agnostic: the AWS_* / RUNAI_STREAMER_* vars in .env select the
  # backend (see docs/s3-llm.md). Requires runai-model-streamer[s3].
  # Verified live 2026-07-16: Wasabi stream (9.3GB/15s) -> healthy -> completion
  # via gateway :4000. At 0.90 gpu it only fits the L4 solo; free capacity first.
  # - id: qwen3.5-4b-s3
  #   model: s3://llm-qwen3.5-4b-bucket/Qwen3.5-4B
  #   served_model_name: Qwen3.5-4B
  #   load_format: runai_streamer
  #   port: 8003
  #   gpu_memory_utilization: 0.90   # sized for solo serving; shrink to co-exist
  #   max_model_len: 4096
  #   attention_backend: FLASHINFER
  #   lmcache:
  #     enabled: true
  #     mamba_align: true
  #     chunk_size: 544   # verify N from vLLM startup log for the 4B variant
  #   extra_args: ["--trust-remote-code", "--enable-chunked-prefill",
  #                "--max-num-seqs", "4"]
  #   cost:             # synthetic amortized GPU rate (USD per 1M tokens) for spend tracking
  #     input_per_mtok: 0.05
  #     output_per_mtok: 0.20
  #   description: "Qwen 3.5 4B – streamed from S3 object storage, no local disk"

  # Add more instances below. Examples:
  #
  # Gemma 4 (sliding-window + full attention hybrid): supported by the
  # LMCache MP connector out of the box -- no mamba_align, default chunk_size:
  # - id: gemma-4-e2b
  #   model: google/gemma-4-E2B-it
  #   port: 8004
  #   gpu_memory_utilization: 0.45
  #   description: "Gemma 4 E2B – hybrid SWA, KV cache via LMCache MP"
  #
  # Standard model:
  # - id: llama-3b
  #   model: meta-llama/Llama-3.2-3B-Instruct
  #   port: 8002
  #   gpu_memory_utilization: 0.30
  #   description: "LLaMA 3B – general purpose"
  #   fallbacks: [qwen-0.8b]  # if this instance OOMs or times out, route here
  #
  # LoRA adapter:
  # - id: custom-lora
  #   model: meta-llama/Llama-3.2-3B-Instruct
  #   port: 8003
  #   gpu_memory_utilization: 0.30
  #   lora:
  #     enabled: true
  #     modules:
  #       - name: my-task-adapter
  #         path: /path/to/lora/adapter
  #
  # Custom Jinja2 output template:
  # - id: service-a-model
  #   model: Qwen/Qwen3.5-0.8B
  #   port: 8004
  #   gpu_memory_utilization: 0.35
  #   chat_template: configs/templates/service_a.jinja2
  #
  # Multi-GPU:
  # - id: large-model
  #   model: Qwen/Qwen2.5-7B-Instruct
  #   port: 8005
  #   gpu_memory_utilization: 0.80
  #   tensor_parallel_size: 2
  #
  # Tool-calling bench model (quantized):
  # - id: qwen-4b-fp8
  #   model: Qwen/Qwen3.5-4B
  #   port: 8006
  #   gpu_memory_utilization: 0.20
  #   quantization: fp8
  #   tool_parser: hermes
  #   reasoning_parser: qwen3

# Remote OpenAI-compatible upstreams, routed through the same :4000 gateway.
# These run no local process (no port / GPU) and are never launched or health-gated.
# Set DEEPSEEK_API_KEY in .env. A local instance may fall back to one of these
# (e.g. fallbacks: [deepseek-v4-flash]) to escalate overflow / hard queries.
remote_models:
  - id: deepseek-v4-pro
    upstream_model: deepseek-v4-pro
    api_base: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    cost:             # PLACEHOLDER: update to DeepSeek's current list price
      input_per_mtok: 0.55
      output_per_mtok: 2.19
    description: "DeepSeek V4 Pro – hosted, thinking-capable"

  - id: deepseek-v4-flash
    upstream_model: deepseek-v4-flash
    api_base: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    cost:             # PLACEHOLDER: update to DeepSeek's current list price
      input_per_mtok: 0.14
      output_per_mtok: 0.28
    description: "DeepSeek V4 Flash – hosted, fast/cheap"

litellm:
  port: 4000
  master_key: "os.environ/LITELLM_MASTER_KEY"
  routing_strategy: least-busy
  prometheus: false  # LiteLLM's prometheus callback is enterprise-gated (litellm#7817);
                     # request metrics come from each vLLM instance's native /metrics.

# Gateway content safety (XGuard classifier, runs in-proxy via guard_hook).
# Input (pre-call) checks are always on while enabled; response checks are
# opt-in via check_output (non-streaming responses only). Services opt out
# individually with `guardrails: false`. Keyless callers are always guarded.
guardrails:
  enabled: true
  model: xguard-0.6b   # internal instance id serving the classifier
  threshold: 0.5       # block when any non-safe risk score >= threshold
  check_output: false  # set true to also classify responses (post-call)
  on_error: allow      # fail-open: a guard outage must not take the gateway down
  timeout_s: 2.0

# Service tiers: rate limits, budgets, and scheduling priority (lower = served
# earlier once vLLM priority scheduling lands). Enforced per virtual key.
tiers:
  enterprise:
    priority: 0
    rpm_limit: 1200
    tpm_limit: 500000
  pro:
    priority: 1
    rpm_limit: 300
    tpm_limit: 100000
    max_budget: 25.0
    budget_duration: 30d
  free:
    priority: 2
    rpm_limit: 60
    tpm_limit: 20000
    max_budget: 5.0
    budget_duration: 30d

# Gateway consumers. Each gets its own LiteLLM virtual key via `tunnel keys sync`
# (requires Postgres: make db-up, DATABASE_URL in .env). `models` restricts what
# the key may call; omitted = all registered models.
services:
  - id: klaudia
    tier: enterprise
    models: [qwen-0.8b, deepseek-v4-flash]
    description: "Klaudia assistant service"
  - id: tools-bench
    tier: pro
    guardrails: false   # bench harness sends synthetic traffic; skip the guard hop
    description: "Tools Bench harness"
  - id: development
    tier: free
    models: [qwen-0.8b]
    description: "Ad-hoc developer access"
